apiVersion: v1
kind: Service
metadata:
  name: fresh-bonds-loadbalancer
  namespace: fresh-bonds
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: api
    port: 8080
    targetPort: 8080
    protocol: TCP