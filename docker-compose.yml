version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: fresh-bonds-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
    depends_on:
      - user-service
      - product-service
    networks:
      - fresh-bonds-network

  # User Service
  user-service:
    build: ./services/user-service
    container_name: fresh-bonds-user-service
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb+srv://admin:admin@dev.qzhiudx.mongodb.net/fresh_bonds?retryWrites=true&w=majority&appName=Dev
      - JWT_SECRET=your-super-secret-jwt-key-here
    networks:
      - fresh-bonds-network

  # Product Service
  product-service:
    build: ./services/product-service
    container_name: fresh-bonds-product-service
    ports:
      - "3002:3002"
    environment:
      - MONGODB_URI=mongodb+srv://admin:admin@dev.qzhiudx.mongodb.net/fresh_bonds?retryWrites=true&w=majority&appName=Dev
    networks:
      - fresh-bonds-network

  # Frontend Service
  frontend:
    build: ./services/frontend
    container_name: fresh-bonds-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
    depends_on:
      - api-gateway
    networks:
      - fresh-bonds-network

networks:
  fresh-bonds-network:
    driver: bridge